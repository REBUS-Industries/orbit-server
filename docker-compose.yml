version: "3.9"

# ORBIT Server Docker Stack â€” VM 211 (prod) / VM 212 (dev)
# Includes: ORBIT platform + PRISM file conversion service
# Evolved from Speckle Server 2.31.1 with REBUS customisations.
# All credentials are loaded from .env â€” never commit .env to Git.

services:

  # â”€â”€ Database â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  postgres:
    image: postgres:16.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-orbit}
      POSTGRES_USER:     ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # â”€â”€ Cache / Queue â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      retries: 5

  # â”€â”€ Object Storage â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_USER:?MINIO_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?MINIO_PASSWORD must be set}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      retries: 3

  # â”€â”€ ORBIT Frontend â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Custom image: iFrame embedding, V3 named views, collectionType sidebar
  orbit-frontend:
    image: ghcr.io/cheekiskrub/orbit-frontend:${ORBIT_FRONTEND_VERSION:-latest}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_SERVER_NAME:    ${SERVER_NAME:-ORBIT}
      NUXT_PUBLIC_API_ORIGIN:     ${SERVER_URL:?SERVER_URL must be set}
      NUXT_PUBLIC_LOG_LEVEL:      warn
    depends_on:
      orbit-server:
        condition: service_healthy

  # â”€â”€ ORBIT Server (API / Backend) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Custom image: patched backend, relaxed file size limits
  orbit-server:
    image: ghcr.io/cheekiskrub/orbit-server:${ORBIT_SERVER_VERSION:-latest}
    restart: unless-stopped
    environment:
      CANONICAL_URL:              ${SERVER_URL:?SERVER_URL must be set}
      SESSION_SECRET:             ${SESSION_SECRET:?SESSION_SECRET must be set}
      POSTGRES_URL:               postgres://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-orbit}
      REDIS_URL:                  redis://redis
      S3_ENDPOINT:                http://minio:9000
      S3_ACCESS_KEY:              ${MINIO_USER}
      S3_SECRET_KEY:              ${MINIO_PASSWORD}
      S3_BUCKET:                  orbit-objects
      FILE_SIZE_LIMIT_MB:         ${FILE_SIZE_LIMIT_MB:-1000}
      EMAIL_HOST:                 ${EMAIL_HOST:-}
      EMAIL_PORT:                 ${EMAIL_PORT:-587}
      EMAIL_USERNAME:             ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD:             ${EMAIL_PASSWORD:-}
      EMAIL_FROM:                 ${EMAIL_FROM:-orbit@rebus.industries}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10

  # â”€â”€ Preview Service â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Custom image: no-op Camera converter for clean 3D thumbnails
  orbit-preview:
    image: ghcr.io/cheekiskrub/orbit-preview:${ORBIT_PREVIEW_VERSION:-latest}
    restart: unless-stopped
    environment:
      SERVER_URL:   http://orbit-server:3000
      REDIS_URL:    redis://redis
    depends_on:
      - orbit-server
      - redis

  # â”€â”€ Webhook Service (upstream) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  webhook-service:
    image: speckle/speckle-webhook-service:2
    restart: unless-stopped
    environment:
      LOG_LEVEL:    warn
      REDIS_URL:    redis://redis
      SERVER_URL:   http://orbit-server:3000

  # â”€â”€ File Import Service (upstream) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fileimport-service:
    image: speckle/speckle-fileimport-service:2
    restart: unless-stopped
    environment:
      SERVER_URL:   http://orbit-server:3000
      REDIS_URL:    redis://redis
    depends_on:
      - orbit-server

  # â”€â”€ PRISM â€” File Conversion Service â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Handles DWG / FBX / IFC / OBJ â†’ ORBIT objects
  # Shares Valkey with the rest of the stack for job queue
  prism:
    image: ghcr.io/cheekiskrub/orbit-prism:${ORBIT_PRISM_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      RHINOCOMPUTE_URL: ${RHINOCOMPUTE_URL:-http://compute.rebus.industries}
      ORBIT_SERVER_URL: http://orbit-server:3000
      REDIS_URL:        redis://redis
      PORT:             8765
    depends_on:
      orbit-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # â”€â”€ Internal Caddy (routes within the stack) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
