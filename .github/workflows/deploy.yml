name: Deploy ORBIT Server

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Deploy runs on a self-hosted runner installed on VM 211 (internal IP
# 10.0.200.211). GitHub-hosted runners cannot SSH to private RFC1918 addresses —
# the previous appleboy/ssh-action approach timed out with "dial tcp :22: i/o timeout".

jobs:
  deploy-prod:
    runs-on: [self-hosted, orbit-prod]
    timeout-minutes: 120
    steps:
      - name: Sync repo and deploy stack
        run: |
          set -euo pipefail
          cd /opt/orbit/server
          git fetch origin main
          git reset --hard origin/main
          docker compose pull --ignore-buildable
          docker compose build --pull orbit-server orbit-frontend
          docker compose up -d --remove-orphans
          docker image prune -f
          echo "✓ ORBIT PROD deploy complete: $(date)"
          docker compose ps
