name: Deploy ORBIT Server

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Org self-hosted runner (self-hosted, Linux, X64) SSHs to VM 211. /opt/orbit/server
# is owned by the orbit user — run scripts/deploy.sh via sudo -u orbit so git pull
# can write .git/ (PROD_VM_USER is typically dom and lacks repo write access).

jobs:
  deploy-prod:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 120
    steps:
      - name: Deploy to VM 211 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_VM_HOST }}
          username: ${{ secrets.PROD_VM_USER }}
          key:      ${{ secrets.PROD_VM_SSH_KEY }}
          command_timeout: 120m
          script: |
            set -euo pipefail
            REPO=/opt/orbit/server
            DEPLOY_USER=$(stat -c '%U' "${REPO}/.git")
            # Discard local VM edits before deploy.sh (e.g. manual patch attempts).
            sudo -u "${DEPLOY_USER}" bash -c "cd '${REPO}' && git fetch origin main && git reset --hard origin/main"
            sudo -u "${DEPLOY_USER}" bash "${REPO}/scripts/deploy.sh"
