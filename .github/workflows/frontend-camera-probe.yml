name: Frontend Camera Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe VM 211 frontend image for camera default
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_VM_HOST }}
          username: ${{ secrets.PROD_VM_USER }}
          key: ${{ secrets.PROD_VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/orbit/server
            CID=$(docker compose ps -q orbit-frontend)
            echo "CID=$CID"
            IMG=$(docker inspect --format '{{.Config.Image}}' "$CID")
            echo "IMG=$IMG"
            echo "=== files containing 2.356 ==="
            docker run --rm --entrypoint sh "$IMG" -c 'grep -rl "2.356" /speckle-server 2>/dev/null | head -20 || true'
            echo "=== setOrbit snippets ==="
            docker run --rm --entrypoint sh "$IMG" -c 'for f in $(grep -rl "setOrbit" /speckle-server 2>/dev/null | head -10); do echo "FILE: $f"; grep -oE ".{0,40}setOrbit\([^)]*\).{0,12}" "$f" | head -5; done || true'