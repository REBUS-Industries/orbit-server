version: "3.9"

# ORBIT Server Docker Stack â€” VM 211 (prod) / VM 212 (dev)
# Includes: ORBIT platform + PRISM file conversion service
# ORBIT server stack — built on open-source Speckle Server foundations.
# All credentials are loaded from .env â€” never commit .env to Git.

services:

  # â”€â”€ Database â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  postgres:
    image: postgres:16.9-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-orbit}
      POSTGRES_USER:     ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # â”€â”€ Cache / Queue â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      retries: 5

  # â”€â”€ Object Storage â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_USER:?MINIO_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?MINIO_PASSWORD must be set}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # â”€â”€ ORBIT Frontend â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Image: ghcr.io/rebus-orbit/orbit-frontend (built from REBUS-ORBIT/orbit-server source)
  orbit-frontend:
    image: ghcr.io/rebus-orbit/orbit-frontend:${ORBIT_FRONTEND_VERSION:-latest}
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_SERVER_NAME:         ${SERVER_NAME:-ORBIT}
      NUXT_PUBLIC_API_ORIGIN:          ${SERVER_URL:?SERVER_URL must be set}
      NUXT_PUBLIC_BACKEND_API_ORIGIN:  http://orbit-server:3000
      NUXT_PUBLIC_BASE_URL:            ${SERVER_URL}
      NUXT_PUBLIC_SSL_ENABLED:         "true"
      NUXT_REDIS_URL:                  redis://redis
      SPECKLE_SERVER_URL:              http://orbit-server:3000
      NUXT_PUBLIC_LOG_LEVEL:           warn
    depends_on:
      orbit-server:
        condition: service_healthy

  # â”€â”€ ORBIT Server (API / Backend) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Image: ghcr.io/rebus-orbit/orbit-server
  orbit-server:
    image: ghcr.io/rebus-orbit/orbit-server:${ORBIT_SERVER_VERSION:-latest}
    restart: unless-stopped
    environment:
      CANONICAL_URL:              ${SERVER_URL:?SERVER_URL must be set}
      SESSION_SECRET:             ${SESSION_SECRET:?SESSION_SECRET must be set}
      POSTGRES_URL:               postgres://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-orbit}
      REDIS_URL:                  redis://redis
      S3_ENDPOINT:                http://minio:9000
      S3_ACCESS_KEY:              ${MINIO_USER}
      S3_SECRET_KEY:              ${MINIO_PASSWORD}
      S3_BUCKET:                  orbit-objects
      S3_CREATE_BUCKET:              "true"
      S3_REGION:                    ""
      FILE_SIZE_LIMIT_MB:         ${FILE_SIZE_LIMIT_MB:-1000}
      EMAIL_HOST:                 ${EMAIL_HOST:-}
      EMAIL_PORT:                 ${EMAIL_PORT:-587}
      EMAIL_USERNAME:             ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD:             ${EMAIL_PASSWORD:-}
      EMAIL_FROM:                 ${EMAIL_FROM:-orbit@rebus.industries}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "try{require('node:http').request({port:3000,hostname:'127.0.0.1',path:'/readiness',method:'GET',timeout:2000},(r)=>{process.exit(r.statusCode===200?0:1)}).end()}catch{process.exit(1)}"]
      interval: 15s
      timeout: 5s
      retries: 10

  # â”€â”€ Preview Service â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Image: ghcr.io/rebus-orbit/orbit-preview
  orbit-preview:
    image: ghcr.io/rebus-orbit/orbit-preview:${ORBIT_PREVIEW_VERSION:-latest}
    restart: unless-stopped
    environment:
      PORT:         3001
      SERVER_URL:   http://orbit-server:3000
      REDIS_URL:    redis://redis
    depends_on:
      - orbit-server
      - redis

  # â”€â”€ Webhook Service (upstream) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  webhook-service:
    image: speckle/speckle-webhook-service:2
    restart: unless-stopped
    environment:
      LOG_LEVEL:    warn
      REDIS_URL:    redis://redis
      SERVER_URL:   http://orbit-server:3000
      PGHOST:           postgres
      PGPORT:           5432
      PGDATABASE:       ${POSTGRES_DB:-orbit}
      PGUSER:           ${POSTGRES_USER:-orbit}
      PGPASSWORD:       ${POSTGRES_PASSWORD}
      DATABASE_URL:     postgres://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-orbit}
      POSTGRES_URL:     postgres://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-orbit}
      PG_CONNECTION_STRING: postgres://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-orbit}
  # â”€â”€ File Import Service (upstream) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  fileimport-service:
    image: speckle/speckle-fileimport-service:2
    restart: unless-stopped
    environment:
      SERVER_URL:   http://orbit-server:3000
      REDIS_URL:    redis://redis
    depends_on:
      - orbit-server

  # â”€â”€ PRISM â€” File Conversion Service â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Handles DWG / FBX / IFC / OBJ â†’ ORBIT objects
  # Shares Valkey with the rest of the stack for job queue
  prism:
    image: ghcr.io/rebus-orbit/orbit-prism:${ORBIT_PRISM_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      RHINOCOMPUTE_URL: ${RHINOCOMPUTE_URL:-http://compute.rebus.industries}
      ORBIT_SERVER_URL: http://orbit-server:3000
      REDIS_URL:        redis://redis
      PORT:             8765
    depends_on:
      orbit-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # â”€â”€ Internal Caddy (routes within the stack) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # dns_search: [] prevents the VM's AD search domain (ad.rebus.industries) from
    # being appended to Docker service names, which breaks container-to-container resolution.
    dns_search: []
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
