# External HA Caddy proxy additions — add to LXC 251 and LXC 252
# File location on proxy VMs: /etc/caddy/Caddyfile
#
# After editing, reload on both proxy VMs:
#   systemctl reload caddy
#
# Existing entries (keep these — VM 201 / legacy Speckle stays running):
#   speckle.rebus.industries     → 10.0.200.11
#   speckle-dev.rebus.industries → 10.0.200.112
#   convert.rebus.industries     → 10.0.200.11:8765  (old 3DConvert)
#
# New entries to add (ORBIT prod on VM 211; PRISM dev on VM 212):

orbit.rebus.industries {
    # Remove X-Frame-Options so iFrame embedding works in REBUS apps
    header {
        -X-Frame-Options
        Content-Security-Policy "frame-ancestors 'self' https://app.rebus.industries"
    }

    # Route Speckle backend protocol (websocket upgrade for subscriptions)
    @backend path /graphql /api/* /auth/* /objects/* /preview/* /blob/*
    reverse_proxy @backend 10.0.200.211:3000 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
    }

    # Everything else → frontend
    reverse_proxy 10.0.200.211:80 {
        header_up Host {host}
    }
}

# PRISM — exposed directly on its own subdomain
# (also accessible via orbit.rebus.industries/convert/* but this is cleaner for API clients)
prism.rebus.industries {
    reverse_proxy 10.0.200.211:8765 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
    }
}

prism-dev.rebus.industries {
    reverse_proxy 10.0.200.212:8765 {
        header_up Host {host}
    }
}
